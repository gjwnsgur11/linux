<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Toolkit</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<script> tailwind.config = { theme: { extend: { fontFamily: { sans: ['Pretendard', 'sans-serif'], mono: ['JetBrains Mono', 'monospace'] } } } } </script>
<style>
body { background-color: rgb(248, 250, 252); color: rgb(30, 41, 59); }
.nav-btn { display: flex; align-items: center; gap: 0.75rem; width: 100%; padding: 0.75rem 1rem; margin-bottom: 0.25rem; border-radius: 0.5rem; color: rgb(100, 116, 139); font-size: 0.95rem; text-align: left; cursor: pointer; transition: background-color 0.2s, color 0.2s; }
.nav-btn:hover { background-color: rgb(241, 245, 249); color: rgb(15, 23, 42); }
.nav-btn.active { background-color: rgb(239, 246, 255); color: rgb(37, 99, 235); font-weight: 600; border-right: 3px solid rgb(37, 99, 235); border-top-right-radius: 0; border-bottom-right-radius: 0; }
.compact-row { display: flex; align-items: center; justify-content: space-between; padding: 0.75rem 1rem; border: 1px solid rgb(226, 232, 240); border-radius: 0.5rem; margin-bottom: 0.5rem; transition: border-color 0.15s ease; background-color: rgb(255, 255, 255); cursor: pointer; }
.compact-row:hover { border-color: rgb(191, 219, 254); background-color: rgb(248, 250, 252); }
.copied-flash { animation: flashGreen 0.6s ease-out; }
@keyframes flashGreen {
0% { background-color: rgb(220, 252, 231); }
100% { background-color: rgb(255, 255, 255); }
}
.no-scrollbar::-webkit-scrollbar { display: none; }
.no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
.top-btn { position: fixed; bottom: 2rem; right: 2rem; background-color: rgb(37, 99, 235); color: white; width: 3rem; height: 3rem; border-radius: 9999px; display: flex; justify-content: center; align-items: center; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); cursor: pointer; transition: opacity 0.3s, transform 0.2s; opacity: 0; pointer-events: none; z-index: 50; }
.top-btn.show { opacity: 1; pointer-events: auto; }
.top-btn:hover { transform: translateY(-3px); background-color: rgb(29, 78, 216); }
</style>
</head>
<body class="flex h-screen overflow-hidden font-sans bg-slate-50">

<aside class="group relative z-20 flex-shrink-0 w-12 hover:w-[19rem] transition-all duration-300 ease-in-out cursor-pointer">
<div class="absolute top-0 right-0 w-[19rem] h-full flex bg-white border-r border-slate-200 shadow-[2px_0_12px_rgba(0,0,0,0.06)]">
<div class="w-64 h-full flex flex-col flex-shrink-0 bg-white overflow-hidden">
<div class="p-4 border-b border-slate-200 bg-white">
<div class="flex items-center gap-2 mb-4">
<i class="fas fa-terminal text-blue-600 text-lg"></i>
<span class="text-lg text-slate-800 tracking-tight font-semibold whitespace-nowrap">Systems Toolkit</span>
</div>
<div class="relative w-full">
<i class="fas fa-search absolute left-3 top-1/2 transform -translate-y-1/2 text-slate-400 text-sm"></i>
<input type="text" id="searchInput" oninput="filterCommands()" placeholder="명령어 검색..." class="w-full bg-slate-50 text-sm border border-slate-200 focus:border-blue-400 focus:ring-1 focus:ring-blue-400 rounded-md py-2 pl-9 pr-3 outline-none text-slate-700 placeholder-slate-400 transition-colors">
</div>
</div>
<nav class="flex-1 overflow-y-auto p-3 no-scrollbar bg-white" id="sidebarNav">
<button onclick="switchTab('sec-shortcut')" data-target="sec-shortcut" class="nav-btn active"><i class="fas fa-keyboard w-6 text-center shrink-0"></i><span class="ml-2 whitespace-nowrap">단축키</span></button>
<button onclick="switchTab('sec-vi')" data-target="sec-vi" class="nav-btn"><i class="fas fa-edit w-6 text-center shrink-0"></i><span class="ml-2 whitespace-nowrap">Vi 마스터</span></button>
<button onclick="switchTab('sec-rhel')" data-target="sec-rhel" class="nav-btn"><i class="fas fa-server w-6 text-center shrink-0"></i><span class="ml-2 whitespace-nowrap">RHEL 초기설정</span></button>
<button onclick="switchTab('sec-grep')" data-target="sec-grep" class="nav-btn"><i class="fas fa-search w-6 text-center shrink-0"></i><span class="ml-2 whitespace-nowrap">Grep 검색</span></button>
<button onclick="switchTab('sec-ln')" data-target="sec-ln" class="nav-btn"><i class="fas fa-link w-6 text-center shrink-0"></i><span class="ml-2 whitespace-nowrap">링크 관리</span></button>
<button onclick="switchTab('sec-nmcli')" data-target="sec-nmcli" class="nav-btn"><i class="fas fa-network-wired w-6 text-center shrink-0"></i><span class="ml-2 whitespace-nowrap">네트워크</span></button>
<button onclick="switchTab('sec-firewall')" data-target="sec-firewall" class="nav-btn"><i class="fas fa-shield-alt w-6 text-center shrink-0"></i><span class="ml-2 whitespace-nowrap">방화벽</span></button>
<button onclick="switchTab('sec-system')" data-target="sec-system" class="nav-btn"><i class="fas fa-hdd w-6 text-center shrink-0"></i><span class="ml-2 whitespace-nowrap">시스템 관리</span></button>
</nav>
</div>
<div class="w-12 h-full bg-white flex-shrink-0"></div>
</div>
</aside>

<main class="flex-1 h-screen overflow-y-auto bg-white p-8 md:p-12 relative w-full" id="mainArea">
<div class="max-w-5xl mx-auto">

<div id="sec-shortcut" class="content-section">
<h1 class="text-3xl text-slate-800 mb-6 border-b border-slate-100 pb-4 tracking-tight">터미널 핵심 단축키</h1>
<div id="shortcut-container" class="grid gap-3"></div>
</div>
<div id="sec-vi" class="content-section hidden">
<h1 class="text-3xl text-slate-800 mb-6 border-b border-slate-100 pb-4 tracking-tight">Vi 마스터 치트시트</h1>
<div id="vi-container" class="space-y-8"></div>
</div>
<div id="sec-rhel" class="content-section hidden">
<h1 class="text-3xl text-slate-800 mb-6 border-b border-slate-100 pb-4 tracking-tight">RHEL 초기 설정 자동화</h1>
<div class="flex items-center gap-3 mb-8 bg-slate-50 p-5 rounded-lg border border-slate-200">
<span class="text-sm font-semibold text-slate-700">OS 버전 선택:</span>
<select id="rhel-version" onchange="handleVersionChange()" class="w-48 bg-white border border-slate-300 text-slate-800 text-sm rounded-md focus:outline-none focus:border-blue-400 p-2 shadow-sm">
<option value="" selected disabled>선택하세요</option>
<option value="7.9">RHEL 7.9</option>
<option value="8.10">RHEL 8.10</option>
<option value="9.4">RHEL 9.4</option>
<option value="custom" class="text-blue-600 font-semibold">직접 입력</option>
</select>
<input type="text" id="custom-rhel-version" placeholder="예: 9.2" class="hidden w-32 bg-white border border-blue-400 text-blue-800 text-sm rounded-md p-2 outline-none" oninput="loadScriptBlocks()">
</div>
<div id="script-container" class="space-y-6"></div>
</div>
<div id="sec-grep" class="content-section hidden">
<h1 class="text-3xl text-slate-800 mb-6 border-b border-slate-100 pb-4 tracking-tight">Grep 텍스트 검색</h1>
<div id="grep-container" class="grid gap-3"></div>
</div>
<div id="sec-ln" class="content-section hidden">
<h1 class="text-3xl text-slate-800 mb-6 border-b border-slate-100 pb-4 tracking-tight">파일 링크 관리 (ln)</h1>
<div id="ln-container" class="grid gap-3"></div>
</div>
<div id="sec-nmcli" class="content-section hidden">
<h1 class="text-3xl text-slate-800 mb-6 border-b border-slate-100 pb-4 tracking-tight">네트워크 관리 (nmcli)</h1>
<div id="nmcli-container" class="grid gap-3"></div>
</div>
<div id="sec-firewall" class="content-section hidden">
<h1 class="text-3xl text-slate-800 mb-6 border-b border-slate-100 pb-4 tracking-tight">방화벽 (iptables/firewalld)</h1>
<div id="firewall-container" class="grid gap-3"></div>
</div>
<div id="sec-system" class="content-section hidden">
<h1 class="text-3xl text-slate-800 mb-6 border-b border-slate-100 pb-4 tracking-tight">시스템 및 디스크 관리</h1>
<div id="system-container" class="grid gap-3"></div>
</div>

</div>
<button id="scrollTopBtn" class="top-btn" onclick="scrollToTop()">
<i class="fas fa-arrow-up"></i>
</button>
</main>

<script>
function switchTab(tabId) {
document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
const activeBtn = document.querySelector(`[data-target="${tabId}"]`);
if(activeBtn) activeBtn.classList.add('active');
document.querySelectorAll('.content-section').forEach(sec => sec.classList.add('hidden'));
const targetSec = document.getElementById(tabId);
if(targetSec) targetSec.classList.remove('hidden');
}

function filterCommands() {
const query = document.getElementById('searchInput').value.toLowerCase().trim();
if (query.length > 0) {
document.querySelectorAll('.content-section').forEach(sec => sec.classList.remove('hidden'));
document.querySelectorAll('.search-item').forEach(item => {
const text = item.innerText.toLowerCase();
item.style.display = text.includes(query) ? '' : 'none';
});
document.querySelectorAll('.content-section').forEach(sec => {
const hasVisible = Array.from(sec.querySelectorAll('.search-item')).some(item => item.style.display !== 'none');
if(!hasVisible) sec.classList.add('hidden');
});
} else {
document.querySelectorAll('.search-item').forEach(item => item.style.display = '');
const activeBtn = document.querySelector('.nav-btn.active');
if(activeBtn) switchTab(activeBtn.getAttribute('data-target'));
}
}

function copyCommand(element) {
const cmdText = element.getAttribute('data-cmd');
if (!cmdText) return;
const iconElement = element.querySelector('.copy-icon');
navigator.clipboard.writeText(cmdText).then(() => {
element.classList.add('copied-flash');
setTimeout(() => element.classList.remove('copied-flash'), 600);
const oldClass = iconElement.className;
iconElement.className = 'fas fa-check text-emerald-600 copy-icon text-sm shrink-0 p-2 mt-2 sm:mt-0';
setTimeout(() => { iconElement.className = oldClass; }, 1500);
});
}

function createRowHTML(item) {
const row = document.createElement('div');
const isNoCopy = item.noCopy === true;
const cmdToCopy = item.copyCmd !== undefined ? item.copyCmd : item.cmd;
row.className = 'compact-row search-item flex-col sm:flex-row items-start sm:items-center';
if (!isNoCopy) {
row.setAttribute('data-cmd', cmdToCopy);
row.onclick = function() { copyCommand(this); };
} else {
row.style.cursor = 'default';
}
const iconHtml = isNoCopy ? 
`<span class="text-xs text-slate-400 bg-slate-100 px-2 py-1 rounded border border-slate-200 shrink-0 mt-2 sm:mt-0">직접 입력</span>` : 
`<i class="far fa-copy text-slate-400 copy-icon text-sm transition-colors shrink-0 p-2 mt-2 sm:mt-0"></i>`;
row.innerHTML = `
<div class="flex items-center pr-4 w-full sm:w-1/2 mb-2 sm:mb-0 gap-2">
<span class="text-xs bg-slate-100 text-slate-500 px-2 py-0.5 rounded border border-slate-200 shrink-0 font-semibold">${item.tag}</span>
<span class="text-sm text-slate-700 break-words whitespace-normal leading-snug mt-0.5">${item.desc}</span>
</div>
<div class="flex items-center justify-start sm:justify-end w-full sm:w-1/2 gap-3">
<code class="text-sm font-mono text-blue-700 bg-blue-50 border border-blue-100 px-3 py-1.5 rounded break-all whitespace-normal max-w-full">${item.cmd}</code>
${iconHtml}
</div>
`;
return row;
}

function renderCompactList(containerId, data) {
const container = document.getElementById(containerId);
if(!container) return;
container.innerHTML = '';
data.forEach(item => { container.appendChild(createRowHTML(item)); });
}

function escapeHtml(text) {
return text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
}

function getRhelScriptTemplate(ver) {
const major = parseInt(ver.split('.')[0]) || 8;
const isYum = major <= 7;
const pkgMgr = isYum ? 'yum' : 'dnf';
const timeDaemon = isYum ? 'ntpd' : 'chronyd';
const timePkg = isYum ? 'ntp' : 'chrony';
const isoName = isYum ? `rhel-server-${ver}-x86_64-dvd.iso` : `rhel-${ver}-x86_64-dvd.iso`;
const repoSetup = isYum ? `[RHEL-DVD]\nname=RHEL${ver}\nbaseurl=file:///media/\nenabled=1\ngpgcheck=0` : `[RHEL-BaseOS]\nname=RHEL${ver}-BaseOS\nbaseurl=file:///media/BaseOS/\nenabled=1\ngpgcheck=0\n[RHEL-AppStream]\nname=RHEL${ver}-AppStream\nbaseurl=file:///media/AppStream/\nenabled=1\ngpgcheck=0`;

return `[GROUP] 🗄️ [STEP 1] NAS 마운트 및 ISO 로컬 복사
[TITLE] 1. CIFS 패키지 압축 해제
tar -zxvf cifs${ver}.tar.gz
[TITLE] 2. 패키지 설치
rpm -Uvh *.rpm
[TITLE] 3. 마운트 폴더 생성
mkdir /nas
[TITLE] 4. NAS 마운트
mount -t cifs \\\\192.168.0.2\\heojh /nas -o username=heojh
[TITLE] 5. ISO 파일 로컬 복사
cp /nas/Linux/RHEL\\ ${ver}/${isoName} /root
[TITLE] 6. NAS 마운트 해제
umount /nas
[GROUP] ⚙️ [STEP 2] RHEL 기본 환경 구성
[TITLE] profile 설정추가
cat << 'EOF' >> /etc/profile
export TZ=KST-9
alias dstat='dstat -t -cdnpmgs --top-bio --top-cpu --top-mem'
alias ls='ls --color=auto --time-style=long-iso'
alias cachedelete='sysctl -w vm.drop_caches="3"'
umask 022
export LANG=en_US.UTF-8
export PS1='\\[\\033[01;33m\\][\\u\\[\\033[01;32m\\]@\\h:\\[\\033[00;36m\\]$PWD]\\[\\033[00m\\] \\$ '
export HISTSIZE=10000
export HISTTIMEFORMAT="[%Y-%m-%d_%H:%M:%S] "
export GREP_OPTIONS='--color=auto'
export GREP_COLOR='1;33'
export LS_COLORS="no=00:fi=00:di=01;44:ln=01;36:pi=40;33:so=01;35:bd=40;33;01:cd=40;33;01:or=01;05;37;41:mi=01;05;37;41:ex=01;32:*.cmd=01;32:*.exe=01;32:*.com=01;32:*.btm=01;32:*.bat=01;32:*.sh=01;32:*.csh=01;32:*.tar=01;31:*.tgz=01;31:*.arj=01;31:*.taz=01;31:*.lzh=01;31:*.zip=01;31:*.z=01;31:*.Z=01;31:*.gz=01;31:*.bz2=01;31:*.bz=01;31:*.tz=01;31:*.rpm=01;31:*.log=33:*.LOG=33"
export LIBGUESTFS_BACKEND=direct
EOF
source /etc/profile
[TITLE] rhel ${ver} iso 파일 mount
mount -o loop /root/${isoName} /media/
[TITLE] local repo 설정
cat << EOF > /etc/yum.repos.d/local-dvd.repo
${repoSetup}
EOF
[TITLE] 에러 확인 및 캐시 재생성
mount -a 
${pkgMgr} clean all
${pkgMgr} makecache
#[TITLE] file system 재부팅 iso 자동 mount
#echo "/root/${isoName}            /media                                        iso9660   defaults   0 0" >> /etc/fstab
[TITLE] SELinux 비활성화 및 커널 반영
sed -i s/"enforcing"/"disabled"/g /etc/selinux/config
echo NOZEROCONF=yes >> /etc/sysconfig/network
grub2-mkconfig -o /boot/grub2/grub.cfg
[TITLE] 접속 경고문 세팅
cat << EOF > /etc/issue
                       WARNING !!!!!!!
************************************************************************
* Access to this computer system and associated network, computer      *
* resources or data is restricted to those authorized by KT Company.   *
* This computer and related networks, resources or data may only       *
* be used for business purpose.                                        *
************************************************************************
EOF
\\cp /etc/issue /etc/issue.net
\\cp /etc/issue /etc/motd
chmod 755 /sbin/unix_chkpwd
[GROUP] 📦 [STEP 3] 용도별 패키지 설치
[TITLE] 1. 기본 시스템 관리 패키지
${pkgMgr} -y install ${timePkg} git net-snmp net-snmp-utils hdparm smartmontools ipmitool lm_sensors OpenIPMI net-tools iotop lrzsz dstat pciutils sg3_utils lsscsi sysstat mcelog wget bzip2 tcpdump nmap vim createrepo strace sos httpd yum-utils dos2unix lsof unzip
systemctl enable --now ${timeDaemon}
[TITLE] 2. 오라클 설치 필수 패키지
${isYum ? `${pkgMgr} -y install gcc make ksh bc traceroute numactl libnsl binutils gcc-c++ glibc glibc-devel libgcc libstdc++ libstdc++-devel libaio libaio-devel unixODBC unixODBC-devel xterm elfutils-libelf elfutils-libelf-devel glibc-common glibc-headers ncurses-devel.x86_64 ncurses-libs libasan liblsan compat-libstdc++-33 compat-libcap1` : `${pkgMgr} -y install gcc make ksh bc traceroute numactl libnsl binutils gcc-c++ glibc glibc-devel libgcc libstdc++ libstdc++-devel libaio libaio-devel unixODBC unixODBC-devel xterm elfutils-libelf elfutils-libelf-devel glibc-common glibc-headers ncurses-devel.x86_64 ncurses-libs libasan liblsan ncurses-compat-libs compat-openssl10`}
[TITLE] 3. X11 포워딩 및 GUI 환경 패키지
${pkgMgr} -y install glibc.i686 libXext libXtst libX11 libXau libxcb libXi xorg-x11-utils xauth libXp fontconfig-devel libXrender
[TITLE] 4. KVM 가상화 패키지
${pkgMgr} -y install qemu-kvm libvirt virt-install virt-manager libvirt-client
systemctl enable --now libvirtd
[TITLE] 5. 개발 도구 패키지
${pkgMgr} -y groupinstall "Development Tools"`;
}

function copyRhelScript(element) {
const cmdText = element.getAttribute('data-cmd');
if (!cmdText) return;
const iconElement = element.querySelector('.copy-icon');
navigator.clipboard.writeText(cmdText).then(() => {
const oldClass = iconElement.className;
iconElement.className = 'fas fa-check text-emerald-600 text-sm copy-icon transition-colors';
setTimeout(() => { iconElement.className = oldClass; }, 1500);
element.classList.remove('border-slate-200', 'hover:border-blue-300');
element.classList.add('border-emerald-500');
});
}

function handleVersionChange() {
const select = document.getElementById('rhel-version');
const customInput = document.getElementById('custom-rhel-version');
if (select.value === 'custom') {
customInput.classList.remove('hidden');
customInput.focus();
if (customInput.value.trim() !== '') loadScriptBlocks();
} else {
customInput.classList.add('hidden');
loadScriptBlocks();
}
}

function loadScriptBlocks() {
const select = document.getElementById('rhel-version');
const customInput = document.getElementById('custom-rhel-version');
const container = document.getElementById('script-container');
let version = select.value;
if (version === 'custom') {
version = customInput.value.trim();
if (!version) {
container.innerHTML = `<div class="p-8 text-center text-slate-500 bg-slate-50 rounded-lg border border-slate-200">원하시는 버전을 입력해주세요.</div>`;
return;
}
}
if (!version) return;
container.innerHTML = '';
const rawText = getRhelScriptTemplate(version);
const lines = rawText.split('\n');
let groups = [];
let currentGroup = { title: '기본 설정', blocks: [] };
let currentBlock = null;

lines.forEach(line => {
const trimmed = line.trim();
if (trimmed.startsWith('[GROUP]')) {
if (currentBlock) {
currentGroup.blocks.push(currentBlock);
currentBlock = null;
}
if (currentGroup.blocks.length > 0) groups.push(currentGroup);
currentGroup = { title: trimmed.replace('[GROUP]', '').trim(), blocks: [] };
} else if (trimmed.startsWith('[TITLE]')) {
if (currentBlock) currentGroup.blocks.push(currentBlock);
currentBlock = { title: trimmed.replace('[TITLE]', '').trim(), code: [] };
} else {
if (currentBlock && trimmed !== '') currentBlock.code.push(line);
}
});
if (currentBlock) currentGroup.blocks.push(currentBlock);
if (currentGroup.blocks.length > 0) groups.push(currentGroup);

groups.forEach((group) => {
const groupDiv = document.createElement('div');
groupDiv.className = 'mb-8 search-item';
groupDiv.innerHTML = `<h3 class="text-lg text-slate-800 mb-4 font-semibold tracking-tight">${group.title}</h3>`;
group.blocks.forEach(block => {
const codeText = block.code.join('\n').trim();
if (!codeText) return;
const blockDiv = document.createElement('div');
blockDiv.className = 'mb-3 border border-slate-200 rounded-lg bg-white overflow-hidden transition-colors hover:border-blue-300 hover:shadow-sm group';
blockDiv.setAttribute('data-cmd', codeText);
blockDiv.onclick = function() { copyRhelScript(this); };
blockDiv.innerHTML = `
<div class="flex justify-between items-center px-4 py-3 border-b border-slate-100 bg-slate-50 cursor-pointer">
<div class="flex items-center gap-2">
<span class="text-xs font-semibold bg-white text-slate-500 px-2 py-0.5 rounded border border-slate-200">Script</span>
<span class="text-sm font-semibold text-slate-700">${block.title}</span>
</div>
<div class="flex items-center justify-center w-8 h-8 bg-white border border-slate-200 rounded shadow-sm group-hover:border-blue-400 group-hover:bg-blue-50 transition-all shrink-0">
<i class="far fa-copy text-slate-400 group-hover:text-blue-600 transition-colors text-sm copy-icon"></i>
</div>
</div>
<code class="block text-sm font-mono text-blue-800 bg-white p-4 overflow-x-auto whitespace-pre leading-relaxed">${escapeHtml(codeText)}</code>
`;
groupDiv.appendChild(blockDiv);
});
container.appendChild(groupDiv);
});
if (document.getElementById('searchInput').value.trim() !== '') filterCommands();
}

const shortcutData = [
{ tag: "단어 삭제", cmd: "Ctrl+w", desc: "한 단어 삭제", noCopy: true },

function renderVi() {
const container = document.getElementById('vi-container');
if(!container) return;
container.innerHTML = '';
viData.forEach(sect => {
const sectionDiv = document.createElement('div');
sectionDiv.innerHTML = `
<h3 class="text-sm text-slate-500 mb-3 font-semibold uppercase tracking-wider">${sect.category}</h3>
<div class="grid gap-3 vi-grid-inner"></div>
`;
const gridInner = sectionDiv.querySelector('.vi-grid-inner');
sect.items.forEach(item => { gridInner.appendChild(createRowHTML(item)); });
container.appendChild(sectionDiv);
});
}

function setupScroll() {
const mainAreaNode = document.getElementById('mainArea');
if (mainAreaNode) {
mainAreaNode.addEventListener('scroll', function() {
const btn = document.getElementById('scrollTopBtn');
if (mainAreaNode.scrollTop > 200) {
btn.classList.add('show');
} else {
btn.classList.remove('show');
}
});
}
}

function scrollToTop() {
const mainAreaNode = document.getElementById('mainArea');
if (mainAreaNode) {
mainAreaNode.scrollTo({ top: 0, behavior: 'smooth' });
}
}
